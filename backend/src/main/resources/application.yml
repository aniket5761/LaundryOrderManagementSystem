server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/laundry_db
    username: laundry_user
    password: laundry_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: MyVerySecureSecretKeyForJWTTokenGenerationAndValidationWithMinimum64Characters123456
  expiration: 86400000

logging:
  level:
    root: INFO
    com:
      laundry: DEBUG
